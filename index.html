<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="KerjainYuk — Catat cepat, kerjakan sekarang, selesai tepat waktu." />
    <title>KerjainYuk</title>
    <script>
      try {
        var raw = localStorage.getItem('kerjainyuk:theme');
        var theme = raw ? JSON.parse(raw) : 'light';
        var color = theme === 'dark' ? '#0f172a' : '#ffffff';
        document.querySelector('meta[name="theme-color"]').content = color;
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
